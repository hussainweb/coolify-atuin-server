name: Docker Compose Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start services
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yaml up -d

      - name: Wait for Atuin to be ready
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8888/ > /dev/null; then
              echo "Atuin is up!"
              exit 0
            fi
            echo "Waiting for Atuin..."
            sleep 2
          done
          echo "Atuin failed to start"
          docker compose -f docker-compose.yaml -f docker-compose.test.yaml logs
          exit 1

      - name: Verify response
        run: |
          RESPONSE=$(curl -s http://localhost:8888/)
          echo "Response: $RESPONSE"
          if [[ $RESPONSE == *"Great A'Tuin"* ]]; then
            echo "Verification successful!"
          else
            echo "Verification failed: Unexpected response content"
            exit 1
          fi

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yaml down
